version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.1
    container_name: navi-postgres-dev
    environment:
      POSTGRES_USER: navi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: navi
    volumes:
      - postgres_dev_data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - navi-network

  # Redis Cache
  redis:
    image: redis:8.4.0
    container_name: navi-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - navi-network

  # Backend API with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: navi-backend-dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://navi:devpassword@postgres:5432/navi}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: "true"
      CORS_ORIGINS: http://localhost,http://localhost:5173,http://localhost:80
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - navi-network

  # Frontend with hot reload
  frontend:
    image: node:22-slim
    container_name: navi-frontend-dev
    working_dir: /app
    environment:
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - navi-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  navi-network:
    driver: bridge
