apiVersion: apps/v1
kind: Deployment
metadata:
  name: navi-frontend
  namespace: navi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: navi-frontend
  template:
    metadata:
      labels:
        app: navi-frontend
    spec:
      containers:
        - name: navi-frontend
          image: your-registry/navi-frontend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: navi-frontend
  namespace: navi
spec:
  selector:
    app: navi-frontend
  ports:
    - port: 80
      targetPort: 8080
