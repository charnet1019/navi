apiVersion: v1
kind: Secret
metadata:
  name: navi-secret
  namespace: navi
type: Opaque
stringData:
  # 部署前务必修改以下值
  POSTGRES_PASSWORD: "change-me-in-production"
  SECRET_KEY: "change-me-use-at-least-32-characters-random-string"
  DATABASE_URL: "postgresql+asyncpg://navi:change-me-in-production@postgres:5432/navi"
  REDIS_URL: "redis://redis:6379/0"
