apiVersion: v1
kind: ConfigMap
metadata:
  name: navi-config
  namespace: navi
data:
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  DEBUG: "false"
  CORS_ORIGINS: "*"
  CORS_ALLOW_CREDENTIALS: "true"
  AUTH_ACCESS_COOKIE_NAME: "navi_access_token"
  AUTH_REFRESH_COOKIE_NAME: "navi_refresh_token"
  AUTH_CSRF_COOKIE_NAME: "navi_csrf_token"
  AUTH_CSRF_HEADER_NAME: "X-CSRF-Token"
  AUTH_COOKIE_SECURE: "true"
  AUTH_COOKIE_SAMESITE: "lax"
  AUTH_COOKIE_DOMAIN: ""
  API_V1_PREFIX: "/api/v1"
  LOG_LEVEL: "INFO"
